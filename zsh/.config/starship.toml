"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 1000
add_newline = false

format = """
$conda\
$os$directory \
${custom.giturl} \
$git_branch \
$git_status\
$git_metrics\
$line_break\
$character
"""

right_format = """
$cmd_duration\
$time
"""

[os]
disabled = false
format = "[$output]($style)"

