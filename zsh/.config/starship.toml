"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "
"~" = "´Çò "

[custom.giturl]
# disabled = true
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL="´Éê "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL="´èû "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL="´à▒ "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL="´Şí "
else
    GIT_REMOTE_SYMBOL="´çÆ "
fi
echo "$GIT_REMOTE_SYMBOL "
"""
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
format = "at $output "

[git_branch]
symbol = "´Éİ "
style = "green"
format =  'on [$symbol$branch(:$remote_branch)]($style)'

[git_status]
ahead = 'Ôçí${count}'
diverged = 'ÔçòÔçí${ahead_count}Ôçú${behind_count}'
behind = 'Ôçú${count}'
format = '$ahead_behind([\[($all_status)\]]($style) )'

[git_metrics]
disabled = false
added_style = 'bold green'
deleted_style = 'bold red'
format = '[+$added]($added_style)/[-$deleted]($deleted_style)'

[character]
disabled = false
success_symbol = '[ÔØ»](bold green)'
error_symbol = '[­Øİ╣](bold red)'
vimcmd_symbol = '[¯şà](green)'
vimcmd_replace_one_symbol = '[¯şà](bold purple)'
vimcmd_replace_symbol = '[¯şà](bold purple)'
vimcmd_visual_symbol = '[¯şà](bold lavender)'

