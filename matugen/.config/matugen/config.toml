[config]
fallback_color = "#ffbf9b"
contrast = 1.0


# [config.wallpaper]
# command = "swww"
# arguments = ["img", "--transition-type", "center"]
# set = true

# Register each app's template
[templates.hyprland]
input_path  = '~/.config/matugen/templates/hyprland-colors.conf'
output_path = '~/.config/hypr/colors.conf'
post_hook   = 'hyprctl reload'

[templates.ghostty]
input_path  = '~/.config/matugen/templates/ghostty-colors'
output_path = '~/.config/ghostty/themes/matugen'

[templates.swaync]
input_path  = '~/.config/matugen/templates/swaync.css'
output_path = '~/.config/swaync/colors.css'
post_hook   = 'swaync-client -rs'

[templates.swayosd]
input_path  = '~/.config/matugen/templates/swayosd.css'
output_path = '~/.config/swayosd/colors.css'

[templates.waybar]
input_path  = '~/.config/matugen/templates/colors.css'
output_path = '~/.config/waybar/colors.css'
post_hook   = 'pkill -SIGUSR2 waybar'

[templates.wlogout]
input_path  = '~/.config/matugen/templates/colors-all.css'
output_path = '~/.config/wlogout/colors.css'



